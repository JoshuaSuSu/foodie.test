<title>踩點簿</title>
<style>
:root{
  --paper:#efe9dc;
  --ink:#2a2420;
  --ink-soft:#6b6158;
  --ink-faint:#8f8577;
  --card:#f8f5ec;
  --card-border:rgba(42,36,32,.14);
  --accent:#3f6b52;
  --accent-strong:#2e5741;
  --accent-soft:rgba(63,107,82,.14);
  --amber:#b9711f;
  --line:rgba(42,36,32,.16);
  --shadow:0 1px 2px rgba(42,36,32,.06), 0 8px 24px -12px rgba(42,36,32,.18);
  --radius:14px;
  --font-display:"Avenir Next","Segoe UI Semibold","Helvetica Neue",system-ui,sans-serif;
  --font-body:"Avenir Next","Segoe UI",system-ui,-apple-system,sans-serif;
  --font-mono:ui-monospace,"SF Mono","Cascadia Code","Menlo",monospace;
  --map-land:#e8e0cd;
  --map-border:rgba(42,36,32,.32);
  --map-label:rgba(42,36,32,.55);
  --map-sea:#dce4e0;
}
@media (prefers-color-scheme: dark){
  :root{
    --paper:#17140f;
    --ink:#ede7da;
    --ink-soft:#a79e90;
    --ink-faint:#7c7364;
    --card:#221d16;
    --card-border:rgba(237,231,218,.12);
    --accent:#5fa37d;
    --accent-strong:#7bc79a;
    --accent-soft:rgba(95,163,125,.16);
    --amber:#e3a455;
    --line:rgba(237,231,218,.14);
    --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 28px -14px rgba(0,0,0,.6);
    --map-land:#241f16;
    --map-border:rgba(237,231,218,.28);
    --map-label:rgba(237,231,218,.5);
    --map-sea:#10161a;
  }
}
:root[data-theme="dark"]{
  --paper:#17140f;
  --ink:#ede7da;
  --ink-soft:#a79e90;
  --ink-faint:#7c7364;
  --card:#221d16;
  --card-border:rgba(237,231,218,.12);
  --accent:#5fa37d;
  --accent-strong:#7bc79a;
  --accent-soft:rgba(95,163,125,.16);
  --amber:#e3a455;
  --line:rgba(237,231,218,.14);
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 12px 28px -14px rgba(0,0,0,.6);
  --map-land:#241f16;
  --map-border:rgba(237,231,218,.28);
  --map-label:rgba(237,231,218,.5);
  --map-sea:#10161a;
}
:root[data-theme="light"]{
  --paper:#efe9dc;
  --ink:#2a2420;
  --ink-soft:#6b6158;
  --ink-faint:#8f8577;
  --card:#f8f5ec;
  --card-border:rgba(42,36,32,.14);
  --accent:#3f6b52;
  --accent-strong:#2e5741;
  --accent-soft:rgba(63,107,82,.14);
  --amber:#b9711f;
  --line:rgba(42,36,32,.16);
  --shadow:0 1px 2px rgba(42,36,32,.06), 0 8px 24px -12px rgba(42,36,32,.18);
  --map-land:#e8e0cd;
  --map-border:rgba(42,36,32,.32);
  --map-label:rgba(42,36,32,.55);
  --map-sea:#dce4e0;
}
*{box-sizing:border-box;}
.hidden{display:none !important;}
html,body{margin:0;padding:0;}
body{
  background:var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:15px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
.app{
  max-width:640px;
  margin:0 auto;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding-bottom:96px;
}
::selection{background:var(--accent-soft);}

/* ---------- header ---------- */
.topbar{
  position:sticky;
  top:0;
  z-index:20;
  background:var(--paper);
  border-bottom:1px solid var(--line);
  padding:18px 18px 0;
}
.brand{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:12px;
}
.brand h1{
  font-family:var(--font-display);
  font-weight:800;
  font-size:22px;
  letter-spacing:.02em;
  margin:0;
}
.brand h1 small{
  display:block;
  font-family:var(--font-body);
  font-weight:500;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-top:2px;
}
.stats{
  display:flex;
  gap:14px;
  font-family:var(--font-mono);
  font-variant-numeric:tabular-nums;
  font-size:12px;
  color:var(--ink-soft);
  white-space:nowrap;
}
.stats b{color:var(--ink);font-size:14px;}

/* tabs */
.tabs{
  display:flex;
  gap:4px;
  margin-top:16px;
}
.tab{
  flex:1;
  text-align:center;
  padding:9px 4px;
  font-size:13px;
  font-weight:600;
  color:var(--ink-soft);
  border-bottom:2px solid transparent;
  cursor:pointer;
  user-select:none;
  transition:color .15s ease;
}
.tab.active{color:var(--accent-strong);border-bottom-color:var(--accent);}
.tab:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

/* ---------- decide panel ---------- */
.decide{
  margin:16px 18px 4px;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:16px;
}
.decide-row{
  display:flex;
  gap:8px;
  align-items:center;
}
.decide-btn{
  flex:1;
  font-family:var(--font-display);
  font-weight:800;
  font-size:16px;
  letter-spacing:.03em;
  color:#fff;
  background:var(--accent);
  border:none;
  border-radius:10px;
  padding:14px 16px;
  cursor:pointer;
  transition:background .15s ease, transform .1s ease;
}
.decide-btn:hover{background:var(--accent-strong);}
.decide-btn:active{transform:scale(.98);}
.decide-scope{
  font-size:12px;
  color:var(--ink-soft);
  background:transparent;
  border:1px solid var(--line);
  border-radius:10px;
  padding:13px 10px;
  font-family:var(--font-body);
  cursor:pointer;
}
.decide-result{
  margin-top:14px;
  border-top:1px dashed var(--line);
  padding-top:14px;
  display:none;
}
.decide-result.show{display:block;animation:reveal .28s ease;}
@keyframes reveal{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
@media (prefers-reduced-motion: reduce){.decide-result.show{animation:none;}}
.decide-empty{color:var(--ink-soft);font-size:13px;padding-top:2px;}
.near-toggle{
  display:flex;align-items:center;gap:7px;
  margin-top:12px;
  font-size:12.5px;
  color:var(--ink-soft);
  cursor:pointer;
  user-select:none;
}
.near-toggle.disabled{opacity:.45;pointer-events:none;}
.near-toggle input{accent-color:var(--accent);}
.decide-card .name{
  font-family:var(--font-display);
  font-weight:800;
  font-size:19px;
  text-wrap:balance;
}
.decide-card .meta{
  margin-top:4px;
  font-size:12.5px;
  color:var(--ink-soft);
}
.decide-actions{
  display:flex;
  gap:8px;
  margin-top:12px;
}
.btn-line{
  font-family:var(--font-body);
  font-weight:600;
  font-size:13px;
  border:1px solid var(--line);
  background:transparent;
  color:var(--ink);
  border-radius:8px;
  padding:8px 12px;
  cursor:pointer;
}
.btn-line:hover{border-color:var(--accent);color:var(--accent-strong);}

/* ---------- filters ---------- */
.filters{
  margin:14px 18px 0;
  display:flex;
  gap:8px;
}
.search{
  flex:1;
  font-family:var(--font-body);
  font-size:14px;
  padding:9px 12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card);
  color:var(--ink);
}
.search:focus{outline:2px solid var(--accent);outline-offset:1px;}
.area-select{
  font-family:var(--font-body);
  font-size:13px;
  padding:9px 10px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card);
  color:var(--ink);
  max-width:120px;
}

/* ---------- toolbar / location ---------- */
.toolbar2{
  margin:10px 18px 0;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
.view-toggle{width:132px;flex:0 0 auto;}
.loc-btn{
  font-family:var(--font-body);
  font-size:12.5px;
  font-weight:600;
  padding:9px 12px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--card);
  color:var(--ink);
  cursor:pointer;
  white-space:nowrap;
}
.loc-btn:hover{border-color:var(--accent);}
.loc-btn.active{border-color:var(--accent);color:var(--accent-strong);background:var(--accent-soft);}
.loc-status{
  margin:8px 18px 0;
  font-size:12px;
  color:var(--ink-soft);
  min-height:16px;
}
.loc-status.error{color:#b5484a;}

/* ---------- map ---------- */
.map-wrap{
  margin:14px 18px 0;
  position:relative;
  height:60vh;
  min-height:340px;
  background:var(--map-sea);
  border:1px solid var(--card-border);
  border-radius:var(--radius);
  overflow:hidden;
  box-shadow:var(--shadow);
}
.map-svg{width:100%;height:100%;display:block;touch-action:none;cursor:grab;}
.map-svg.grabbing{cursor:grabbing;}
.map-hint{
  position:absolute;top:8px;left:8px;z-index:2;
  font-size:11px;color:var(--ink-faint);
  background:var(--paper);
  padding:4px 9px;
  border-radius:6px;
  opacity:.9;
  pointer-events:none;
  max-width:60%;
}
.map-note{
  position:absolute;top:8px;right:8px;z-index:2;
  font-size:11px;color:var(--ink-faint);
  background:var(--paper);
  padding:4px 9px;
  border-radius:6px;
  opacity:.9;
  max-width:38%;
  text-align:right;
  line-height:1.4;
}
.map-empty{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  text-align:center;color:var(--ink-faint);font-size:13px;
  padding:0 30px;
}
.map-controls{
  position:absolute;right:10px;bottom:10px;z-index:2;
  display:flex;flex-direction:column;gap:6px;
}
.map-controls button{
  width:32px;height:32px;
  border-radius:8px;
  border:1px solid var(--line);
  background:var(--card);
  color:var(--ink);
  font-size:16px;
  font-family:var(--font-mono);
  cursor:pointer;
  line-height:1;
}
.map-controls button:hover{border-color:var(--accent);color:var(--accent-strong);}
.map-callout{
  position:absolute;z-index:3;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:10px;
  box-shadow:var(--shadow);
  padding:10px 12px;
  max-width:190px;
  transform:translate(-50%,-116%);
}
.map-callout .name{font-weight:700;font-size:13px;text-wrap:balance;}
.map-callout .meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px;}
.map-callout button{
  margin-top:8px;
  font-size:12px;font-weight:700;
  color:#fff;background:var(--accent);
  border:none;border-radius:6px;
  padding:6px 11px;cursor:pointer;
  font-family:var(--font-body);
}
.county-shape{fill:var(--map-land);stroke:var(--map-border);stroke-width:1.4;pointer-events:none;}
.county-label{
  fill:var(--map-label);
  font-family:var(--font-body);
  font-size:12px;
  font-weight:600;
  text-anchor:middle;
  pointer-events:none;
  letter-spacing:.02em;
}
.map-point-want{fill:var(--card);stroke:var(--ink-faint);stroke-width:1.5;stroke-dasharray:2 2;}
.map-point-visited{fill:var(--accent);stroke:var(--card);stroke-width:1.5;}
.map-point.selected{stroke:var(--amber) !important;stroke-width:2.5 !important;}
.map-me-ring{fill:none;stroke:var(--accent-strong);stroke-width:2;opacity:.55;transform-box:fill-box;transform-origin:center;animation:mapPulse 1.8s ease-out infinite;}
.map-me-dot{fill:var(--accent-strong);stroke:var(--paper);stroke-width:2;}
@keyframes mapPulse{
  0%{transform:scale(.4);opacity:.55;}
  100%{transform:scale(1.6);opacity:0;}
}
@media (prefers-reduced-motion: reduce){.map-me-ring{animation:none;opacity:.25;}}

/* ---------- list ---------- */
.list{
  margin:14px 18px 0;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.empty-state{
  text-align:center;
  color:var(--ink-faint);
  font-size:13px;
  padding:40px 0;
}
.card{
  position:relative;
  background:var(--card);
  border:1px solid var(--card-border);
  border-radius:12px;
  padding:12px 14px;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:12px;
  transition:border-color .15s ease;
}
.card:hover{border-color:var(--accent);}
.card:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}
.stamp{
  flex-shrink:0;
  width:34px;height:34px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);
  font-size:11px;font-weight:700;
  border:1.5px solid currentColor;
}
.stamp.visited{color:var(--accent);}
.stamp.want{color:var(--ink-faint);border-style:dashed;}
.card-body{flex:1;min-width:0;}
.card-body .name{
  font-weight:700;
  font-size:14.5px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.card-body .sub{
  margin-top:2px;
  font-size:12px;
  color:var(--ink-soft);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.card-rating{
  flex-shrink:0;
  font-family:var(--font-mono);
  font-variant-numeric:tabular-nums;
  font-size:13px;
  color:var(--amber);
  font-weight:700;
}

/* ---------- fab ---------- */
.fab{
  position:fixed;
  right:calc(50% - 320px + 20px);
  bottom:24px;
  width:52px;height:52px;
  border-radius:50%;
  background:var(--accent);
  color:#fff;
  border:none;
  font-size:26px;
  line-height:1;
  box-shadow:var(--shadow);
  cursor:pointer;
  z-index:25;
}
@media (max-width:680px){
  .fab{right:20px;}
}
.fab:hover{background:var(--accent-strong);}

/* ---------- modal ---------- */
.modal-backdrop{
  position:fixed;inset:0;
  background:rgba(0,0,0,.4);
  z-index:40;
  display:flex;
  align-items:flex-end;
  justify-content:center;
}
.modal-backdrop.hidden{display:none;}
.modal{
  background:var(--paper);
  width:100%;
  max-width:640px;
  max-height:88vh;
  overflow-y:auto;
  border-radius:18px 18px 0 0;
  padding:20px 20px calc(20px + env(safe-area-inset-bottom));
  box-shadow:0 -8px 30px rgba(0,0,0,.25);
}
@media (min-width:700px){
  .modal-backdrop{align-items:center;}
  .modal{border-radius:16px;max-height:80vh;}
}
.modal-handle{
  width:36px;height:4px;border-radius:2px;
  background:var(--line);
  margin:0 auto 16px;
}
.modal h2{
  font-family:var(--font-display);
  font-weight:800;
  font-size:20px;
  margin:0 0 2px;
  text-wrap:balance;
}
.field-group{margin-top:16px;}
.field-label{
  font-size:11px;
  font-weight:700;
  letter-spacing:.06em;
  text-transform:uppercase;
  color:var(--ink-faint);
  margin-bottom:6px;
  display:block;
}
.field-value{font-size:14px;color:var(--ink);}
.field-value a{color:var(--accent-strong);}
.field-value.note{white-space:pre-wrap;line-height:1.6;}
input[type=text], textarea, select.input{
  width:100%;
  font-family:var(--font-body);
  font-size:14px;
  padding:9px 10px;
  border:1px solid var(--line);
  border-radius:8px;
  background:var(--card);
  color:var(--ink);
}
textarea{min-height:64px;resize:vertical;}
.row2{display:flex;gap:10px;}
.row2 > *{flex:1;}
.pill-toggle{
  display:flex;
  border:1px solid var(--line);
  border-radius:8px;
  overflow:hidden;
}
.pill-toggle button{
  flex:1;
  border:none;
  background:transparent;
  color:var(--ink-soft);
  font-size:13px;
  font-weight:600;
  padding:9px 0;
  cursor:pointer;
}
.pill-toggle button.active{background:var(--accent);color:#fff;}
.modal-actions{
  display:flex;
  gap:8px;
  margin-top:22px;
}
.btn-primary{
  flex:1;
  font-family:var(--font-display);
  font-weight:700;
  font-size:14px;
  color:#fff;
  background:var(--accent);
  border:none;
  border-radius:10px;
  padding:12px;
  cursor:pointer;
}
.btn-primary:hover{background:var(--accent-strong);}
.btn-danger{
  font-size:13px;
  font-weight:600;
  color:#b5484a;
  background:transparent;
  border:1px solid rgba(181,72,74,.35);
  border-radius:10px;
  padding:12px 16px;
  cursor:pointer;
}
.btn-danger:hover{background:rgba(181,72,74,.08);}
.close-x{
  position:absolute;
  top:16px;right:16px;
  border:none;background:transparent;
  color:var(--ink-faint);
  font-size:20px;
  cursor:pointer;
  line-height:1;
  padding:4px;
}
.stars-input{display:flex;gap:6px;}
.stars-input button{
  border:none;background:transparent;
  font-size:22px;
  color:var(--line);
  cursor:pointer;
  font-family:var(--font-mono);
}
.stars-input button.on{color:var(--amber);}
</style>

<div class="app">
  <header class="topbar">
    <div class="brand">
      <h1>踩點簿<small>Where to eat, decided</small></h1>
      <div class="stats"><span><b id="statVisited">0</b> 去過</span><span><b id="statWant">0</b> 想去</span></div>
    </div>
    <div class="tabs" id="tabs">
      <div class="tab active" data-scope="all">全部</div>
      <div class="tab" data-scope="visited">去過</div>
      <div class="tab" data-scope="want">想去</div>
    </div>
  </header>

  <section class="decide">
    <div class="decide-row">
      <button class="decide-btn" id="decideBtn">決定我要吃什麼</button>
      <select class="decide-scope" id="decideScope">
        <option value="all">從全部抽</option>
        <option value="want">只從想去的抽</option>
        <option value="visited">只從去過的抽</option>
      </select>
    </div>
    <label class="near-toggle disabled" id="nearToggle">
      <input type="checkbox" id="nearCheck" /> 優先抽附近 5 公里內的店
    </label>
    <div class="decide-result" id="decideResult"></div>
  </section>

  <section class="filters">
    <input class="search" id="search" type="text" placeholder="搜尋店名、地址、筆記…" />
    <select class="area-select" id="areaSelect"><option value="">所有地區</option></select>
  </section>

  <section class="toolbar2">
    <select class="area-select" id="sortSelect">
      <option value="default">預設排序</option>
      <option value="distance">離我最近</option>
      <option value="rating">評分最高</option>
    </select>
    <div class="pill-toggle view-toggle" id="viewToggle">
      <button data-view="list" class="active">列表</button>
      <button data-view="map">地圖</button>
    </div>
    <button class="loc-btn" id="locateBtn">定位我的位置</button>
    <button class="loc-btn" id="manualPinBtn">手動設定位置</button>
  </section>
  <div class="loc-status" id="locStatus"></div>

  <section class="list" id="list"></section>

  <section class="map-wrap hidden" id="mapWrap">
    <div class="map-hint">拖曳平移・滾輪縮放・點點看詳情</div>
    <div class="map-note hidden" id="mapNote"></div>
    <svg id="mapSvg" class="map-svg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="map-callout hidden" id="mapCallout"></div>
    <div class="map-controls">
      <button id="mapZoomIn" aria-label="放大" type="button">+</button>
      <button id="mapZoomOut" aria-label="縮小" type="button">－</button>
      <button id="mapReset" aria-label="重新置中" type="button">⟳</button>
    </div>
  </section>

  <button class="fab" id="addFab" title="新增餐廳" aria-label="新增餐廳">+</button>
</div>

<div class="modal-backdrop hidden" id="detailBackdrop">
  <div class="modal" id="detailModal"></div>
</div>

<div class="modal-backdrop hidden" id="addBackdrop">

<script>
(function(){
  "use strict";
  var STORAGE_KEY = "restaurant-scout-v1";

  function loadData(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      if(raw) return JSON.parse(raw);
    }catch(e){}
    var seed = JSON.parse(document.getElementById("seed-data").textContent);
    saveData(seed);
    return seed;
  }
  function saveData(data){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }catch(e){}
  }

  var DATA = loadData();
  var scope = "all";
  var query = "";
  var areaFilter = "";
  var sortMode = "default";
  var myLocation = null; /* {lat,lng,source:"gps"|"manual"} */
  var manualPinMode = false;
  var currentView = "list";

  function haversine(lat1,lng1,lat2,lng2){
    var R = 6371;
    var dLat = (lat2-lat1)*Math.PI/180;
    var dLng = (lng2-lng1)*Math.PI/180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
            Math.sin(dLng/2)*Math.sin(dLng/2);
    var c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    return R*c;
  }

  function nextId(){
    var max = 0;
    DATA.forEach(function(e){ if(e.id > max) max = e.id; });
    return max + 1;
  }

  function uniqueAreas(){
    var set = {};
    DATA.forEach(function(e){ if(e.area) set[e.area] = (set[e.area]||0)+1; });
    return Object.keys(set).sort(function(a,b){ return set[b]-set[a]; });
  }

  function populateAreaSelect(){
    var sel = document.getElementById("areaSelect");
    var current = sel.value;
    sel.innerHTML = '<option value="">所有地區</option>';
    uniqueAreas().forEach(function(a){
      var opt = document.createElement("option");
      opt.value = a; opt.textContent = a;
      sel.appendChild(opt);
    });
    sel.value = current;
  }

  function matchesFilters(e){
    if(scope === "visited" && !e.visited) return false;
    if(scope === "want" && e.visited) return false;
    if(areaFilter && e.area !== areaFilter) return false;
    if(query){
      var q = query.toLowerCase();
      var hay = (e.name+" "+(e.address||"")+" "+(e.note||"")).toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  }

  function renderStats(){
    document.getElementById("statVisited").textContent = DATA.filter(function(e){return e.visited;}).length;
    document.getElementById("statWant").textContent = DATA.filter(function(e){return !e.visited;}).length;
  }

  function distanceKm(e){
    if(!myLocation || e.lat == null || e.lng == null) return null;
    return haversine(myLocation.lat, myLocation.lng, e.lat, e.lng);
  }

  function priceLabel(e){
    var bits = [];
    var d = distanceKm(e);
    if(d != null) bits.push(d.toFixed(1)+" km");
    if(e.area) bits.push(e.area);
    if(e.price) bits.push(e.price);
    if(e.mealType) bits.push(e.mealType);
    return bits.join(" · ");
  }

  function filteredSortedData(){
    var items = DATA.filter(matchesFilters);
    if(sortMode === "distance" && myLocation){
      items = items.slice().sort(function(a,b){
        var da = distanceKm(a); var db = distanceKm(b);
        if(da == null) da = Infinity;
        if(db == null) db = Infinity;
        return da-db;
      });
    } else if(sortMode === "rating"){
      items = items.slice().sort(function(a,b){ return (b.rating||0)-(a.rating||0); });
    }
    return items;
  }

  function renderList(){
    var list = document.getElementById("list");
    var items = filteredSortedData();
    list.innerHTML = "";
    if(items.length === 0){
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "沒有符合的餐廳，換個篩選條件，或按右下角新增一間。";
      list.appendChild(empty);
      return;
    }
    items.forEach(function(e){
      var card = document.createElement("div");
      card.className = "card";
      card.tabIndex = 0;
      card.setAttribute("role","button");
      var stampCls = e.visited ? "stamp visited" : "stamp want";
      var stampTxt = e.visited ? "✓" : "?";
      card.innerHTML =
        '<div class="'+stampCls+'">'+stampTxt+'</div>'+
        '<div class="card-body">'+
          '<div class="name"></div>'+
          '<div class="sub"></div>'+
        '</div>'+
        (e.rating ? '<div class="card-rating">'+e.rating+'★</div>' : '');
      card.querySelector(".name").textContent = e.name;
      card.querySelector(".sub").textContent = priceLabel(e) || e.address || "";
      card.addEventListener("click", function(){ openDetail(e.id); });
      card.addEventListener("keydown", function(ev){ if(ev.key==="Enter"||ev.key===" "){ev.preventDefault();openDetail(e.id);} });
      list.appendChild(card);
    });
  }

  function renderAll(){
    renderStats();
    populateAreaSelect();
    renderList();
    if(currentView === "map") renderMap();
  }

  function refreshCurrentView(){
    renderList();
    if(currentView === "map") renderMap();
  }

  document.getElementById("tabs").addEventListener("click", function(ev){
    var t = ev.target.closest(".tab");
    if(!t) return;
    document.querySelectorAll(".tab").forEach(function(x){x.classList.remove("active");});
    t.classList.add("active");
    scope = t.getAttribute("data-scope");
    refreshCurrentView();
  });

  document.getElementById("search").addEventListener("input", function(ev){
    query = ev.target.value.trim();
    refreshCurrentView();
  });

  document.getElementById("areaSelect").addEventListener("change", function(ev){
    areaFilter = ev.target.value;
    refreshCurrentView();
  });

  document.getElementById("sortSelect").addEventListener("change", function(ev){
    sortMode = ev.target.value;
    refreshCurrentView();
  });

  function switchView(v){
    currentView = v;
    document.querySelectorAll("#viewToggle button").forEach(function(b){
      b.classList.toggle("active", b.getAttribute("data-view") === v);
    });
    document.getElementById("list").classList.toggle("hidden", v !== "list");
    document.getElementById("mapWrap").classList.toggle("hidden", v !== "map");
    if(v === "map") renderMap();
  }

  document.getElementById("viewToggle").addEventListener("click", function(ev){
    var b = ev.target.closest("button");
    if(!b) return;
    switchView(b.getAttribute("data-view"));
  });

  /* ---------- location ---------- */
  function setLocStatus(msg, isError){
    var el = document.getElementById("locStatus");
    el.textContent = msg;
    el.classList.toggle("error", !!isError);
  }

  function onLocationChanged(){
    document.getElementById("nearToggle").classList.toggle("disabled", !myLocation);
    document.getElementById("locateBtn").classList.toggle("active", !!myLocation);
    refreshCurrentView();
  }

  document.getElementById("locateBtn").addEventListener("click", function(){
    if(!navigator.geolocation){
      setLocStatus("這個瀏覽器不支援定位。切換到地圖模式,點一下地圖上你的位置即可手動設定。", true);
      return;
    }
    setLocStatus("定位中…");
    navigator.geolocation.getCurrentPosition(function(pos){

  /* ---------- map ---------- */
  var mapSvg = document.getElementById("mapSvg");
  var mapWrap = document.getElementById("mapWrap");
  var mapCallout = document.getElementById("mapCallout");
  var mapProj = null;
  var mapPanX = 0, mapPanY = 0, mapZoom = 1;
  var selectedPointId = null;
  var activePointers = {};
  var dragState = null;
  var pinchState = null;

  function clamp(v,min,max){ return Math.max(min,Math.min(max,v)); }

  function computeProjection(points){
    var lats = points.map(function(p){return p.lat;});
    var lngs = points.map(function(p){return p.lng;});
    var minLat = Math.min.apply(null, lats), maxLat = Math.max.apply(null, lats);
    var minLng = Math.min.apply(null, lngs), maxLng = Math.max.apply(null, lngs);
    if(minLat === maxLat){ minLat -= 0.015; maxLat += 0.015; }
    if(minLng === maxLng){ minLng -= 0.015; maxLng += 0.015; }
    var avgLatRad = (minLat+maxLat)/2 * Math.PI/180;
    var lngScale = Math.cos(avgLatRad) || 1;
    var rawW = (maxLng-minLng)*lngScale;
    var rawH = (maxLat-minLat);
    var VW = 1000, VH = 700, PAD = 50;
    var fitScale = Math.min((VW-2*PAD)/rawW, (VH-2*PAD)/rawH);
    if(!isFinite(fitScale) || fitScale <= 0) fitScale = 1;
    var offX = PAD + Math.max(0,((VW-2*PAD)-rawW*fitScale)/2);
    var offY = PAD + Math.max(0,((VH-2*PAD)-rawH*fitScale)/2);
    return {
      VW: VW, VH: VH,
      project: function(lat,lng){
        return {
          x: (lng-minLng)*lngScale*fitScale + offX,
          y: (maxLat-lat)*fitScale + offY
        };
      },
      unproject: function(x,y){
        return {
          lat: maxLat - (y-offY)/fitScale,
          lng: (x-offX)/(fitScale*lngScale) + minLng
        };
      }
    };
  }

  function svgPoint(clientX, clientY){
    var pt = mapSvg.createSVGPoint();
    pt.x = clientX; pt.y = clientY;
    var ctm = mapSvg.getScreenCTM();
    if(!ctm) return {x:0,y:0};
    var p = pt.matrixTransform(ctm.inverse());
    return {x:p.x, y:p.y};
  }

  function localFromViewBox(vx,vy){
    return { x:(vx-mapPanX)/mapZoom, y:(vy-mapPanY)/mapZoom };
  }

  function updateMapTransform(){
    var g = document.getElementById("mapG");
    if(g) g.setAttribute("transform","translate("+mapPanX+","+mapPanY+") scale("+mapZoom+")");
  }

  function zoomAt(clientX, clientY, factor){
    var vp = svgPoint(clientX, clientY);
    var local = localFromViewBox(vp.x, vp.y);
    var newZoom = clamp(mapZoom*factor, 0.5, 6);
    mapPanX = vp.x - local.x*newZoom;
    mapPanY = vp.y - local.y*newZoom;
    mapZoom = newZoom;
    updateMapTransform();
  }

    mapCallout.style.left = (screenX-rect.left)+"px";

  /* ---- Taiwan county outlines (decoded once from an embedded TopoJSON) ---- */
  var countyFeatures = [];
  var TW_BOUNDS = {minLat:21.5, maxLat:26.5, minLng:117.9, maxLng:122.3};

  function decodeTopo(topo){
    var scale = topo.transform.scale, translate = topo.transform.translate;
    var arcs = topo.arcs.map(function(arc){
      var x=0,y=0;
      return arc.map(function(pt){
        x += pt[0]; y += pt[1];
        return [x*scale[0]+translate[0], y*scale[1]+translate[1]];
      });
    });
    function arcCoords(index){
      var rev = index < 0;
      var i = rev ? ~index : index;
      var coords = arcs[i];
      return rev ? coords.slice().reverse() : coords;
    }
    function ring(indices){
      var pts = [];
      indices.forEach(function(idx){
        var seg = arcCoords(idx);
        if(pts.length) seg = seg.slice(1);
        pts = pts.concat(seg);
      });
      return pts;
    }
    var objName = Object.keys(topo.objects)[0];
    var geoms = topo.objects[objName].geometries;
    return geoms.map(function(g){
      var rings = [];
      if(g.type === "Polygon"){
        g.arcs.forEach(function(idxs){ rings.push(ring(idxs)); });
      } else if(g.type === "MultiPolygon"){
        g.arcs.forEach(function(poly){ poly.forEach(function(idxs){ rings.push(ring(idxs)); }); });
      }
      return { name: (g.properties && g.properties.name) || "", rings: rings };
    });
  }

  try{
    var topoRaw = JSON.parse(document.getElementById("tw-topo").textContent);
    countyFeatures = decodeTopo(topoRaw);
  }catch(e){ countyFeatures = []; }

  function featureBounds(feature){
    var best = null, bestLen = -1;
    feature.rings.forEach(function(r){ if(r.length > bestLen){ bestLen = r.length; best = r; } });
    var minLat=Infinity,maxLat=-Infinity,minLng=Infinity,maxLng=-Infinity;
    (best||[]).forEach(function(pt){
      var lng=pt[0], lat=pt[1];
      if(lat<minLat)minLat=lat; if(lat>maxLat)maxLat=lat;
      if(lng<minLng)minLng=lng; if(lng>maxLng)maxLng=lng;
    });
    return {lat:(minLat+maxLat)/2, lng:(minLng+maxLng)/2};
  }

  function inTaiwan(lat,lng){
    return lat >= TW_BOUNDS.minLat && lat <= TW_BOUNDS.maxLat &&
           lng >= TW_BOUNDS.minLng && lng <= TW_BOUNDS.maxLng;
  }

  var taiwanProj = computeProjection([
    {lat: TW_BOUNDS.minLat, lng: TW_BOUNDS.minLng},
    {lat: TW_BOUNDS.maxLat, lng: TW_BOUNDS.maxLng}
  ]);

  function drawCounties(g, svgns){
    var cg = document.createElementNS(svgns, "g");
    cg.setAttribute("id","mapCounties");
    countyFeatures.forEach(function(feature){
      if(!feature.rings.length) return;
      var d = feature.rings.map(function(r){
        var parts = r.map(function(pt,i){
          var p = mapProj.project(pt[1], pt[0]);
          return (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);
        });
        return parts.join("")+"Z";
      }).join(" ");
      var path = document.createElementNS(svgns,"path");
      path.setAttribute("d", d);
      path.setAttribute("class","county-shape");
      cg.appendChild(path);
    });
    countyFeatures.forEach(function(feature){
      if(!feature.rings.length || !feature.name) return;
      var c = featureBounds(feature);
      var p = mapProj.project(c.lat, c.lng);
      var text = document.createElementNS(svgns,"text");
      text.setAttribute("x", p.x.toFixed(1));
      text.setAttribute("y", p.y.toFixed(1));
      text.setAttribute("class","county-label");
      text.textContent = feature.name;
      cg.appendChild(text);
    });
    g.appendChild(cg);
  }

  function renderMap(){
    var allPoints = filteredSortedData().filter(function(e){ return e.lat != null && e.lng != null; });
    var points = allPoints.filter(function(e){ return inTaiwan(e.lat, e.lng); });
    var excludedCount = allPoints.length - points.length;

    mapSvg.innerHTML = "";
    hideCallout();
    selectedPointId = null;

    var noteEl = document.getElementById("mapNote");
    if(excludedCount > 0){
      noteEl.textContent = "另有 "+excludedCount+" 間海外地點未顯示，可切換列表查看";
      noteEl.classList.remove("hidden");
    } else {
      noteEl.classList.add("hidden");
    }

    mapProj = taiwanProj;
    mapPanX = 0; mapPanY = 0; mapZoom = 1;

    var svgns = "http://www.w3.org/2000/svg";
    var g = document.createElementNS(svgns, "g");
    g.setAttribute("id","mapG");

    drawCounties(g, svgns);

    if(points.length === 0){
      mapSvg.appendChild(g);
      updateMapTransform();
      var empty = document.createElement("div");
      empty.className = "map-empty";
      empty.textContent = "這個篩選範圍裡沒有帶座標的餐廳可以顯示在地圖上。";
      mapWrap.appendChild(empty);
      updateMapHint();
      return;
    }
    var oldEmpty = mapWrap.querySelector(".map-empty");
    if(oldEmpty) oldEmpty.remove();

    points.forEach(function(e){
      var p = mapProj.project(e.lat, e.lng);
      var c = document.createElementNS(svgns, "circle");
      c.setAttribute("cx", p.x);
      c.setAttribute("cy", p.y);
      c.setAttribute("r", 6);
      c.setAttribute("class","map-point "+(e.visited ? "map-point-visited" : "map-point-want"));
      c.setAttribute("data-id", e.id);
      g.appendChild(c);
    });

    if(myLocation){
      var mp = mapProj.project(myLocation.lat, myLocation.lng);
      var ring = document.createElementNS(svgns,"circle");
      ring.setAttribute("cx",mp.x); ring.setAttribute("cy",mp.y); ring.setAttribute("r",8);
      ring.setAttribute("class","map-me-ring");
      var dot = document.createElementNS(svgns,"circle");
      dot.setAttribute("cx",mp.x); dot.setAttribute("cy",mp.y); dot.setAttribute("r",7);
      dot.setAttribute("class","map-me-dot");
      g.appendChild(ring);
      g.appendChild(dot);
    }

    mapSvg.appendChild(g);
    updateMapTransform();
    updateMapHint();
  }

  function pointerDist(p1,p2){
    var dx=p1.x-p2.x, dy=p1.y-p2.y;
    return Math.sqrt(dx*dx+dy*dy);
  }

  mapSvg.addEventListener("pointerdown", function(ev){
    activePointers[ev.pointerId] = {x:ev.clientX, y:ev.clientY};
    var ids = Object.keys(activePointers);
    if(ids.length === 1){
      dragState = {
        startClientX: ev.clientX, startClientY: ev.clientY,
        startPanX: mapPanX, startPanY: mapPanY,
        moved: false, targetId: ev.target.getAttribute && ev.target.getAttribute("data-id")
      };
      mapSvg.classList.add("grabbing");
      mapSvg.setPointerCapture(ev.pointerId);
    } else if(ids.length === 2){
      dragState = null;
      var pts = ids.map(function(id){ return activePointers[id]; });
      pinchState = {
        startDist: pointerDist(pts[0], pts[1]),
        startZoom: mapZoom,
        midClientX: (pts[0].x+pts[1].x)/2,
        midClientY: (pts[0].y+pts[1].y)/2
      };
    }
  });

  mapSvg.addEventListener("pointermove", function(ev){
    if(!activePointers[ev.pointerId]) return;
    activePointers[ev.pointerId] = {x:ev.clientX, y:ev.clientY};
    var ids = Object.keys(activePointers);
    if(ids.length === 2 && pinchState){
      var pts = ids.map(function(id){ return activePointers[id]; });
      var dist = pointerDist(pts[0], pts[1]);
      var factor = dist / (pinchState.startDist || dist);
      var vp = svgPoint(pinchState.midClientX, pinchState.midClientY);
      var local = localFromViewBox(vp.x, vp.y);
      var newZoom = clamp(pinchState.startZoom*factor, 0.5, 6);
      mapPanX = vp.x - local.x*newZoom;
      mapPanY = vp.y - local.y*newZoom;
      mapZoom = newZoom;
      updateMapTransform();
      return;
    }
    if(dragState){
      var vpStart = svgPoint(dragState.startClientX, dragState.startClientY);
      var vpNow = svgPoint(ev.clientX, ev.clientY);
      var dx = vpNow.x - vpStart.x, dy = vpNow.y - vpStart.y;
      if(Math.abs(ev.clientX-dragState.startClientX) > 3 || Math.abs(ev.clientY-dragState.startClientY) > 3){
        dragState.moved = true;
      }
      mapPanX = dragState.startPanX + dx;
      mapPanY = dragState.startPanY + dy;
      updateMapTransform();
    }
  });

  function endPointer(ev){
    delete activePointers[ev.pointerId];
    if(Object.keys(activePointers).length < 2) pinchState = null;
    if(Object.keys(activePointers).length === 0){
      mapSvg.classList.remove("grabbing");
      if(dragState && !dragState.moved){
        handleMapTap(ev, dragState.targetId);
      }
      dragState = null;
    }
  }
  mapSvg.addEventListener("pointerup", endPointer);
  mapSvg.addEventListener("pointercancel", endPointer);

  function handleMapTap(ev, targetId){
    if(targetId){
      var e = DATA.find(function(x){ return String(x.id) === String(targetId); });
      if(!e) return;
      selectedPointId = e.id;
      document.querySelectorAll(".map-point").forEach(function(c){
        c.classList.toggle("selected", c.getAttribute("data-id") === String(e.id));
      });
      showCallout(e, ev.clientX, ev.clientY);
      return;
    }
    if(manualPinMode){
      var vp = svgPoint(ev.clientX, ev.clientY);
      var local = localFromViewBox(vp.x, vp.y);
      var geo = mapProj.unproject(local.x, local.y);
      myLocation = {lat: geo.lat, lng: geo.lng, source:"manual"};
      manualPinMode = false;
      setLocStatus("已手動設定你的位置（點在地圖上的位置）");
      updateMapHint();
      onLocationChanged();
      return;
    }
    hideCallout();
  }

  mapSvg.addEventListener("wheel", function(ev){
    ev.preventDefault();
    var factor = ev.deltaY < 0 ? 1.15 : 1/1.15;
    zoomAt(ev.clientX, ev.clientY, factor);
  }, {passive:false});

  document.getElementById("mapZoomIn").addEventListener("click", function(){
    var rect = mapSvg.getBoundingClientRect();
    zoomAt(rect.left+rect.width/2, rect.top+rect.height/2, 1.3);
  });
  document.getElementById("mapZoomOut").addEventListener("click", function(){
    var rect = mapSvg.getBoundingClientRect();
    zoomAt(rect.left+rect.width/2, rect.top+rect.height/2, 1/1.3);
  });
  document.getElementById("mapReset").addEventListener("click", function(){
    renderMap();
  });

  renderAll();
})();
</script>
